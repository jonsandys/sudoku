<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0d1117" />
  <link rel="manifest" href="manifest.webmanifest" />
  <title>Sudoku</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #0d1117;
      --panel: #161b22;
      --panel-2: #21262d;
      --text: #e6edf3;
      --muted: #8b949e;
      --accent: #58a6ff;
      --danger: #f85149;
      --grid-line: #30363d;
      --grid-bold: #6e7681;
      --given: #e6edf3;
      --user: #79c0ff;
      --mark: #a5d6ff;
      --success: #3fb950;
      --match-bg: rgba(88, 166, 255, 0.34);
      --match-ring: rgba(121, 192, 255, 0.95);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
      background: radial-gradient(circle at top, #1f2937 0, var(--bg) 45%);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 1rem;
    }

    .app {
      width: min(640px, 100%);
      background: color-mix(in srgb, var(--panel) 94%, transparent);
      border: 1px solid var(--grid-line);
      border-radius: 16px;
      padding: 1rem;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.45);
    }

    .top {
      display: grid;
      gap: 0.75rem;
      margin-bottom: 0.5rem;
    }

    .meta {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 0.75rem;
      min-height: 1.5rem;
    }

    .controls {
      display: flex;
      gap: 0.5rem;
      align-items: center;
      flex-wrap: wrap;
    }

    select, button {
      background: var(--panel-2);
      color: var(--text);
      border: 1px solid var(--grid-line);
      border-radius: 10px;
      padding: 0.5rem 0.8rem;
      font-size: 0.95rem;
      cursor: pointer;
    }

    button:hover, select:hover { border-color: var(--accent); }

    .timer-wrap {
      text-align: left;
      min-width: 145px;
    }

    .timer {
      font-size: 1.25rem;
      font-weight: 700;
      letter-spacing: 0.05em;
    }

    .best {
      font-size: 0.85rem;
      color: var(--muted);
    }

    .status {
      margin: 0;
      color: var(--muted);
      text-align: right;
      min-height: 1.25rem;
    }

    .status.success { color: var(--success); font-weight: 600; }

    .board {
      display: grid;
      grid-template-columns: repeat(9, 1fr);
      aspect-ratio: 1 / 1;
      border: 2px solid var(--grid-bold);
      border-radius: 10px;
      overflow: hidden;
      user-select: none;
      touch-action: manipulation;
      background: #0b0f14;
    }

    .cell {
      position: relative;
      border: 1px solid var(--grid-line);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: clamp(1.15rem, 4.2vw, 1.85rem);
      font-weight: 700;
      cursor: pointer;
      min-height: 36px;
      color: var(--user);
      transition: background-color 0.15s ease;
    }

    .cell:hover { background: rgba(88, 166, 255, 0.08); }
    .cell.given { color: var(--given); }
    .cell.wrong { color: var(--danger); }
    .cell.match {
      background: var(--match-bg);
      box-shadow:
        inset 0 0 0 2px var(--match-ring),
        inset 0 0 18px rgba(88, 166, 255, 0.25);
      text-shadow: 0 0 12px rgba(121, 192, 255, 0.65);
    }

    .cell.thick-right { border-right: 2px solid var(--grid-bold); }
    .cell.thick-bottom { border-bottom: 2px solid var(--grid-bold); }

    .marks {
      position: absolute;
      inset: 2px;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      grid-template-rows: repeat(3, 1fr);
      font-size: clamp(0.6rem, 2.1vw, 0.95rem);
      color: var(--mark);
      line-height: 1;
      font-weight: 700;
      pointer-events: none;
    }

    .marks span {
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0.9;
    }

    .marks span.mark-match {
      background: rgba(88, 166, 255, 0.28);
      border-radius: 6px;
      box-shadow: inset 0 0 0 1px rgba(121, 192, 255, 0.9);
      color: #d2ebff;
      opacity: 1;
    }

    .pad {
      margin-top: 1rem;
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 0.5rem;
    }

    .pad button {
      min-height: 52px;
      min-width: 0;
      padding: 0.75rem 0.25rem;
      font-size: clamp(0.72rem, 2.1vw, 1rem);
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
      white-space: normal;
      overflow-wrap: anywhere;
      line-height: 1.1;
      text-align: center;
    }

    .pad button.number-btn {
      font-size: clamp(1.35rem, 4vw, 1.8rem);
    }

    .pad button.number-btn.completed {
      opacity: 0.5;
    }

    .pad button.clear-marks-btn {
      grid-row: 3;
      grid-column: 2 / span 2;
    }

    .pad button.pencil-marks-btn {
      grid-row: 3;
      grid-column: 4 / span 2;
    }

    .pad button.undo-btn {
      grid-row: 3;
      grid-column: 1 / span 1;
    }

    .pad button.auto-pencil-btn {
      font-size: clamp(0.66rem, 1.9vw, 0.92rem);
      min-height: 48px;
      padding: 0.5rem 0.25rem;
    }

    .pad button.selected {
      background: color-mix(in srgb, var(--accent) 30%, var(--panel-2));
      border-color: var(--accent);
    }

    .pad button.mode-on {
      border-color: var(--mark);
      color: var(--mark);
    }

    #hintBtn.hint-disabled {
      opacity: 0.42;
      cursor: not-allowed;
      border-color: var(--grid-line);
    }

    @keyframes completeFlash {
      0%, 100% { background: var(--match-bg); }
      50% { background: rgba(63, 185, 80, 0.48); }
    }

    .cell.complete-flash {
      animation: completeFlash 0.22s ease-out 1;
      box-shadow:
        inset 0 0 0 2px rgba(63, 185, 80, 0.95),
        inset 0 0 20px rgba(63, 185, 80, 0.35);
    }

    @media (max-width: 560px) {
      .pad { grid-template-columns: repeat(5, minmax(0, 1fr)); }
      .app { padding: 0.75rem; }
      body { padding: 0.5rem; }
      .controls button {
        white-space: normal;
        overflow-wrap: anywhere;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <div class="top">
      <div class="meta">
        <div class="timer-wrap">
          <div class="timer" id="timer">00:00</div>
          <div class="best" id="bestTime">Best: --:--</div>
        </div>
        <div class="status" id="status"></div>
      </div>
      <div class="controls">
        <label for="difficulty">Difficulty</label>
        <select id="difficulty">
          <option value="easy">Easy</option>
          <option value="medium">Medium</option>
          <option value="hard">Hard</option>
          <option value="expert">Expert</option>
        </select>
        <button id="newGameBtn">New Game</button>
        <button id="hintBtn">Hint</button>
      </div>
    </div>
    <section class="board" id="board" aria-label="Sudoku board"></section>

    <section class="pad" id="numberPad" aria-label="Number pad"></section>
  </main>

  <script>
    const DIFFICULTIES = {
      easy: { givens: 40 },
      medium: { givens: 33 },
      hard: { givens: 28 },
      expert: { givens: 24 }
    };

    const boardEl = document.getElementById('board');
    const numberPadEl = document.getElementById('numberPad');
    const timerEl = document.getElementById('timer');
    const bestTimeEl = document.getElementById('bestTime');
    const statusEl = document.getElementById('status');
    const difficultyEl = document.getElementById('difficulty');
    const newGameBtn = document.getElementById('newGameBtn');
    const hintBtn = document.getElementById('hintBtn');

    let puzzle = [];
    let solution = [];
    let current = [];
    let marks = [];
    let selectedInput = null;
    let pencilMode = false;
    let startTime = null;
    let timerId = null;
    let flashingDigit = null;
    let flashTimeoutId = null;
    let hintsUsed = 0;
    let undoState = null;
    const MAX_HINTS = 2;

    function createEmptyGrid() {
      return Array.from({ length: 9 }, () => Array(9).fill(0));
    }

    function deepCopy(grid) {
      return grid.map(row => [...row]);
    }

    function deepCopyMarks(source) {
      return source.map(row => row.map(cellMarks => new Set(cellMarks)));
    }

    function shuffle(arr) {
      const out = [...arr];
      for (let i = out.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [out[i], out[j]] = [out[j], out[i]];
      }
      return out;
    }

    function isValid(grid, row, col, num) {
      for (let c = 0; c < 9; c++) if (grid[row][c] === num) return false;
      for (let r = 0; r < 9; r++) if (grid[r][col] === num) return false;
      const boxRow = Math.floor(row / 3) * 3;
      const boxCol = Math.floor(col / 3) * 3;
      for (let r = boxRow; r < boxRow + 3; r++) {
        for (let c = boxCol; c < boxCol + 3; c++) {
          if (grid[r][c] === num) return false;
        }
      }
      return true;
    }

    function solveRandom(grid) {
      for (let row = 0; row < 9; row++) {
        for (let col = 0; col < 9; col++) {
          if (grid[row][col] === 0) {
            for (const num of shuffle([1,2,3,4,5,6,7,8,9])) {
              if (isValid(grid, row, col, num)) {
                grid[row][col] = num;
                if (solveRandom(grid)) return true;
                grid[row][col] = 0;
              }
            }
            return false;
          }
        }
      }
      return true;
    }

    function countSolutions(grid, limit = 2) {
      let count = 0;

      function search() {
        if (count >= limit) return;

        let best = null;
        let bestCandidates = null;

        for (let r = 0; r < 9; r++) {
          for (let c = 0; c < 9; c++) {
            if (grid[r][c] !== 0) continue;
            const candidates = [];
            for (let n = 1; n <= 9; n++) if (isValid(grid, r, c, n)) candidates.push(n);
            if (candidates.length === 0) return;
            if (!best || candidates.length < bestCandidates.length) {
              best = [r, c];
              bestCandidates = candidates;
              if (candidates.length === 1) break;
            }
          }
        }

        if (!best) {
          count += 1;
          return;
        }

        const [row, col] = best;
        for (const n of bestCandidates) {
          grid[row][col] = n;
          search();
          grid[row][col] = 0;
          if (count >= limit) return;
        }
      }

      search();
      return count;
    }

    function makePuzzle(difficulty) {
      const full = createEmptyGrid();
      solveRandom(full);
      const puz = deepCopy(full);
      const targetGivens = DIFFICULTIES[difficulty].givens;

      const cells = shuffle(Array.from({ length: 81 }, (_, i) => i));
      let filled = 81;

      for (const idx of cells) {
        if (filled <= targetGivens) break;
        const r = Math.floor(idx / 9);
        const c = idx % 9;
        const saved = puz[r][c];
        puz[r][c] = 0;

        const test = deepCopy(puz);
        if (countSolutions(test, 2) !== 1) {
          puz[r][c] = saved;
        } else {
          filled -= 1;
        }
      }

      return { puzzle: puz, solution: full };
    }

    function formatTime(seconds) {
      const m = Math.floor(seconds / 60).toString().padStart(2, '0');
      const s = (seconds % 60).toString().padStart(2, '0');
      return `${m}:${s}`;
    }

    function updateTimer() {
      if (!startTime) return;
      const elapsed = Math.floor((Date.now() - startTime) / 1000);
      timerEl.textContent = formatTime(elapsed);
    }

    function stopTimer() {
      clearInterval(timerId);
      timerId = null;
    }

    function startTimer() {
      stopTimer();
      startTime = Date.now();
      updateTimer();
      timerId = setInterval(updateTimer, 1000);
    }

    function getBestTimes() {
      try {
        return JSON.parse(localStorage.getItem('sudokuBestTimes') || '{}');
      } catch {
        return {};
      }
    }

    function saveBestTime(difficulty, seconds) {
      const times = getBestTimes();
      if (!times[difficulty] || seconds < times[difficulty]) {
        times[difficulty] = seconds;
        localStorage.setItem('sudokuBestTimes', JSON.stringify(times));
      }
    }

    function renderBestTime() {
      const difficulty = difficultyEl.value;
      const times = getBestTimes();
      bestTimeEl.textContent = `Best: ${times[difficulty] ? formatTime(times[difficulty]) : '--:--'}`;
    }

    function cellIndex(row, col) {
      return row * 9 + col;
    }

    function renderBoard() {
      boardEl.innerHTML = '';

      for (let row = 0; row < 9; row++) {
        for (let col = 0; col < 9; col++) {
          const cell = document.createElement('button');
          cell.type = 'button';
          cell.className = 'cell';
          if ((col + 1) % 3 === 0 && col !== 8) cell.classList.add('thick-right');
          if ((row + 1) % 3 === 0 && row !== 8) cell.classList.add('thick-bottom');
          if (puzzle[row][col] !== 0) cell.classList.add('given');

          const value = current[row][col];
          if (typeof selectedInput === 'number' && value === selectedInput) {
            cell.classList.add('match');
          }
          if (flashingDigit !== null && value === flashingDigit && solution[row][col] === flashingDigit) {
            cell.classList.add('complete-flash');
          }
          if (value !== 0) {
            cell.textContent = value;
            if (value !== solution[row][col] && puzzle[row][col] === 0) {
              cell.classList.add('wrong');
            }
          } else {
            const markWrap = document.createElement('div');
            markWrap.className = 'marks';
            for (let n = 1; n <= 9; n++) {
              const span = document.createElement('span');
              span.textContent = marks[row][col].has(n) ? String(n) : '';
              if (
                typeof selectedInput === 'number' &&
                selectedInput === n &&
                marks[row][col].has(n)
              ) {
                span.classList.add('mark-match');
              }
              markWrap.appendChild(span);
            }
            cell.appendChild(markWrap);
          }

          cell.dataset.index = cellIndex(row, col);
          boardEl.appendChild(cell);
        }
      }
    }

    function renderPad() {
      numberPadEl.innerHTML = '';
      for (let n = 1; n <= 9; n++) {
        const btn = document.createElement('button');
        btn.type = 'button';
        btn.textContent = String(n);
        btn.dataset.input = String(n);
        btn.classList.add('number-btn');
        if (selectedInput === n) btn.classList.add('selected');
        if (isDigitCompleted(n)) {
          btn.disabled = true;
          btn.classList.add('completed');
        }
        numberPadEl.appendChild(btn);
      }

      const autoPencilBtn = document.createElement('button');
      autoPencilBtn.type = 'button';
      autoPencilBtn.textContent = 'Auto Pencil';
      autoPencilBtn.dataset.input = 'auto-pencil';
      autoPencilBtn.classList.add('auto-pencil-btn');
      numberPadEl.appendChild(autoPencilBtn);

      const undoBtn = document.createElement('button');
      undoBtn.type = 'button';
      undoBtn.textContent = 'Undo';
      undoBtn.dataset.input = 'undo';
      undoBtn.classList.add('undo-btn');
      undoBtn.disabled = !undoState;
      numberPadEl.appendChild(undoBtn);

      const pencilBtn = document.createElement('button');
      pencilBtn.type = 'button';
      pencilBtn.textContent = `Pencil ${pencilMode ? 'On' : 'Off'}`;
      pencilBtn.dataset.input = 'pencil-toggle';
      pencilBtn.classList.add('pencil-marks-btn');
      if (pencilMode) pencilBtn.classList.add('mode-on');
      numberPadEl.appendChild(pencilBtn);

      const clearMarksBtn = document.createElement('button');
      clearMarksBtn.type = 'button';
      clearMarksBtn.textContent = 'Clear Marks';
      clearMarksBtn.dataset.input = 'clear-marks';
      numberPadEl.appendChild(clearMarksBtn);

      clearMarksBtn.classList.add('clear-marks-btn');
    }

    function updateHintButton() {
      const remaining = Math.max(0, MAX_HINTS - hintsUsed);
      hintBtn.textContent = `Hint (${remaining})`;
      hintBtn.disabled = remaining === 0;
      hintBtn.classList.toggle('hint-disabled', remaining === 0);
    }

    function saveUndoState() {
      undoState = {
        current: deepCopy(current),
        marks: deepCopyMarks(marks),
        selectedInput,
        pencilMode,
        hintsUsed
      };
    }

    function applyUndoState() {
      if (!undoState) return false;
      current = deepCopy(undoState.current);
      marks = deepCopyMarks(undoState.marks);
      selectedInput = undoState.selectedInput;
      pencilMode = undoState.pencilMode;
      hintsUsed = undoState.hintsUsed;
      undoState = null;
      updateHintButton();
      statusEl.className = 'status';
      statusEl.textContent = '';
      return true;
    }

    function checkWin() {
      for (let r = 0; r < 9; r++) {
        for (let c = 0; c < 9; c++) {
          if (current[r][c] !== solution[r][c]) return false;
        }
      }
      return true;
    }

    function removePeerMarks(row, col, num) {
      for (let c = 0; c < 9; c++) {
        if (c !== col) marks[row][c].delete(num);
      }
      for (let r = 0; r < 9; r++) {
        if (r !== row) marks[r][col].delete(num);
      }
      const boxRow = Math.floor(row / 3) * 3;
      const boxCol = Math.floor(col / 3) * 3;
      for (let r = boxRow; r < boxRow + 3; r++) {
        for (let c = boxCol; c < boxCol + 3; c++) {
          if (r === row && c === col) continue;
          marks[r][c].delete(num);
        }
      }
    }

    function countCorrectPlacements(num) {
      let count = 0;
      for (let r = 0; r < 9; r++) {
        for (let c = 0; c < 9; c++) {
          if (current[r][c] === num && solution[r][c] === num) count += 1;
        }
      }
      return count;
    }

    function isDigitCompleted(num) {
      return countCorrectPlacements(num) >= 9;
    }

    function findNextIncompleteDigit(startAfter) {
      for (let offset = 1; offset <= 9; offset++) {
        const candidate = ((startAfter - 1 + offset) % 9) + 1;
        if (!isDigitCompleted(candidate)) return candidate;
      }
      return null;
    }

    function flashCompletedDigit(num) {
      flashingDigit = num;
      renderBoard();
      clearTimeout(flashTimeoutId);
      flashTimeoutId = setTimeout(() => {
        flashingDigit = null;
        renderBoard();
      }, 320);
    }

    function handleDigitCompletionTransition(num, beforeCount) {
      if (beforeCount >= 9 || !isDigitCompleted(num)) return;
      flashCompletedDigit(num);
      const nextIncomplete = findNextIncompleteDigit(num);
      if (nextIncomplete !== null) selectedInput = nextIncomplete;
    }

    function computeAutoMarks() {
      for (let r = 0; r < 9; r++) {
        for (let c = 0; c < 9; c++) {
          if (current[r][c] !== 0) {
            marks[r][c].clear();
            continue;
          }
          marks[r][c].clear();
          for (let n = 1; n <= 9; n++) {
            if (isMarkAllowed(r, c, n)) marks[r][c].add(n);
          }
        }
      }
    }

    function isMarkAllowed(row, col, num) {
      for (let c = 0; c < 9; c++) {
        if (c !== col && current[row][c] === num) return false;
      }
      for (let r = 0; r < 9; r++) {
        if (r !== row && current[r][col] === num) return false;
      }
      const boxRow = Math.floor(row / 3) * 3;
      const boxCol = Math.floor(col / 3) * 3;
      for (let r = boxRow; r < boxRow + 3; r++) {
        for (let c = boxCol; c < boxCol + 3; c++) {
          if ((r !== row || c !== col) && current[r][c] === num) return false;
        }
      }
      return true;
    }

    function fillHintCell() {
      const empties = [];
      for (let r = 0; r < 9; r++) {
        for (let c = 0; c < 9; c++) {
          if (puzzle[r][c] === 0 && current[r][c] !== solution[r][c]) {
            empties.push([r, c]);
          }
        }
      }
      if (empties.length === 0) return false;
      const [row, col] = empties[Math.floor(Math.random() * empties.length)];
      const value = solution[row][col];
      const previousCount = countCorrectPlacements(value);
      current[row][col] = value;
      marks[row][col].clear();
      removePeerMarks(row, col, value);
      handleDigitCompletionTransition(value, previousCount);
      return true;
    }

    function onCellInput(index) {
      const row = Math.floor(index / 9);
      const col = index % 9;
      if (puzzle[row][col] !== 0) return;

      const hasSinglePencilMark = !pencilMode && current[row][col] === 0 && marks[row][col].size === 1;
      const inferredInput = hasSinglePencilMark ? [...marks[row][col]][0] : null;
      if (selectedInput === null && inferredInput === null) return;

      let changed = false;
      let undoSaved = false;
      const beginMutation = () => {
        if (!undoSaved) {
          saveUndoState();
          undoSaved = true;
        }
      };

      if (current[row][col] !== 0 && current[row][col] !== solution[row][col]) {
        beginMutation();
        current[row][col] = 0;
        marks[row][col].clear();
        changed = true;
        renderBoard();
        renderPad();
        return;
      }

      if (selectedInput === 'erase' && inferredInput === null) {
        beginMutation();
        current[row][col] = 0;
        marks[row][col].clear();
        changed = true;
      } else if (typeof selectedInput === 'number' || inferredInput !== null) {
        const inputToApply = inferredInput ?? selectedInput;
        if (isDigitCompleted(inputToApply)) return;
        if (pencilMode) {
          if (current[row][col] !== 0) return;
          beginMutation();
          if (marks[row][col].has(inputToApply)) {
            marks[row][col].delete(inputToApply);
          } else if (!isMarkAllowed(row, col, inputToApply)) {
            if (undoSaved) undoState = null;
            return;
          } else {
            marks[row][col].add(inputToApply);
          }
          changed = true;
        } else {
          if (!isMarkAllowed(row, col, inputToApply)) return;
          beginMutation();
          const previousCount = countCorrectPlacements(inputToApply);
          current[row][col] = inputToApply;
          marks[row][col].clear();
          removePeerMarks(row, col, inputToApply);
          handleDigitCompletionTransition(inputToApply, previousCount);
          changed = true;
        }
      }

      if (!changed && undoSaved) undoState = null;
      renderBoard();
      renderPad();
      if (!changed) return;
      if (checkWin()) {
        stopTimer();
        const elapsed = Math.floor((Date.now() - startTime) / 1000);
        saveBestTime(difficultyEl.value, elapsed);
        renderBestTime();
        statusEl.className = 'status success';
        statusEl.textContent = `Solved in ${formatTime(elapsed)}!`; 
      } else {
        statusEl.className = 'status';
        statusEl.textContent = '';
      }
    }

    function newGame() {
      statusEl.className = 'status';
      statusEl.textContent = '';
      const difficulty = difficultyEl.value;
      const made = makePuzzle(difficulty);
      puzzle = made.puzzle;
      solution = made.solution;
      current = deepCopy(puzzle);
      marks = Array.from({ length: 9 }, () => Array.from({ length: 9 }, () => new Set()));
      selectedInput = 1;
      pencilMode = false;
      hintsUsed = 0;
      undoState = null;
      renderPad();
      renderBoard();
      renderBestTime();
      updateHintButton();
      startTimer();
      statusEl.textContent = '';
    }

    numberPadEl.addEventListener('click', (e) => {
      const button = e.target.closest('button');
      if (!button) return;
      const input = button.dataset.input;

      if (input === 'pencil-toggle') {
        pencilMode = !pencilMode;
      } else if (input === 'auto-pencil') {
        saveUndoState();
        computeAutoMarks();
      } else if (input === 'undo') {
        applyUndoState();
      } else if (input === 'clear-marks') {
        saveUndoState();
        for (let r = 0; r < 9; r++) {
          for (let c = 0; c < 9; c++) {
            if (puzzle[r][c] === 0 && current[r][c] === 0) marks[r][c].clear();
          }
        }
      } else if (input === 'erase') {
        selectedInput = 'erase';
      } else {
        selectedInput = Number(input);
      }

      renderPad();
      renderBoard();
    });

    boardEl.addEventListener('click', (e) => {
      const cell = e.target.closest('.cell');
      if (!cell) return;
      onCellInput(Number(cell.dataset.index));
    });

    hintBtn.addEventListener('click', () => {
      if (hintsUsed >= MAX_HINTS) return;
      saveUndoState();
      const applied = fillHintCell();
      renderBoard();
      renderPad();
      if (!applied) {
        undoState = null;
        statusEl.className = 'status';
        statusEl.textContent = '';
        return;
      }
      hintsUsed += 1;
      updateHintButton();

      if (checkWin()) {
        stopTimer();
        const elapsed = Math.floor((Date.now() - startTime) / 1000);
        saveBestTime(difficultyEl.value, elapsed);
        renderBestTime();
        statusEl.className = 'status success';
        statusEl.textContent = `Solved in ${formatTime(elapsed)}!`;
      } else {
        statusEl.className = 'status';
        statusEl.textContent = '';
      }
    });

    document.addEventListener('keydown', (e) => {
      const isTypingTarget = e.target instanceof HTMLElement && (
        e.target.tagName === 'INPUT' ||
        e.target.tagName === 'TEXTAREA' ||
        e.target.tagName === 'SELECT'
      );
      if (isTypingTarget) return;

      if (/^[1-9]$/.test(e.key)) {
        selectedInput = Number(e.key);
        renderPad();
        renderBoard();
      } else if (e.key === '0' || e.key === 'Backspace' || e.key === 'Delete') {
        selectedInput = 'erase';
        renderPad();
        renderBoard();
      } else if (e.key.toLowerCase() === 'p') {
        pencilMode = !pencilMode;
        renderPad();
      }
    });

    newGameBtn.addEventListener('click', newGame);
    difficultyEl.addEventListener('change', () => {
      renderBestTime();
      newGame();
    });

    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js').catch((error) => {
          console.error('Service worker registration failed:', error);
        });
      });
    }

    newGame();
  </script>
</body>
</html>
